[pytest]
# TrustShield's own tests live in tests/. Keep collection scoped there so pytest never
# wanders into the gitignored model store (models/ contains vendored upstream repos —
# PaddleOCR, DocTamper — with their own test files and heavy deps we don't install).
testpaths = tests
norecursedirs = models download data .venv node_modules
addopts = -q
